<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- IC die favicon — dark background with gold chip -->
  <rect width="64" height="64" rx="10" fill="#13161e"/>
  <!-- Die body -->
  <rect x="10" y="10" width="44" height="44" rx="4" fill="#c8a84b" fill-opacity="0.15" stroke="#c8a84b" stroke-width="2"/>
  <!-- Inner core -->
  <rect x="17" y="17" width="30" height="30" rx="2" fill="none" stroke="#c8a84b" stroke-width="1.2" opacity="0.55"/>
  <!-- Quadrant cells -->
  <rect x="20" y="20" width="10" height="10" rx="1.5" fill="#c8a84b" opacity="0.85"/>
  <rect x="34" y="20" width="10" height="10" rx="1.5" fill="#c8a84b" opacity="0.4"/>
  <rect x="20" y="34" width="10" height="10" rx="1.5" fill="#c8a84b" opacity="0.4"/>
  <rect x="34" y="34" width="10" height="10" rx="1.5" fill="#c8a84b" opacity="0.85"/>
  <!-- Pins top -->
  <rect x="15" y="2"  width="5" height="9" rx="1.2" fill="#c8a84b"/>
  <rect x="24" y="2"  width="5" height="9" rx="1.2" fill="#c8a84b"/>
  <rect x="33" y="2"  width="5" height="9" rx="1.2" fill="#c8a84b"/>
  <rect x="42" y="2"  width="5" height="9" rx="1.2" fill="#c8a84b"/>
  <!-- Pins bottom -->
  <rect x="15" y="53" width="5" height="9" rx="1.2" fill="#c8a84b"/>
  <rect x="24" y="53" width="5" height="9" rx="1.2" fill="#c8a84b"/>
  <rect x="33" y="53" width="5" height="9" rx="1.2" fill="#c8a84b"/>
  <rect x="42" y="53" width="5" height="9" rx="1.2" fill="#c8a84b"/>
  <!-- Pins left -->
  <rect x="2" y="15" width="9" height="5" rx="1.2" fill="#c8a84b"/>
  <rect x="2" y="24" width="9" height="5" rx="1.2" fill="#c8a84b"/>
  <rect x="2" y="33" width="9" height="5" rx="1.2" fill="#c8a84b"/>
  <rect x="2" y="42" width="9" height="5" rx="1.2" fill="#c8a84b"/>
  <!-- Pins right -->
  <rect x="53" y="15" width="9" height="5" rx="1.2" fill="#c8a84b"/>
  <rect x="53" y="24" width="9" height="5" rx="1.2" fill="#c8a84b"/>
  <rect x="53" y="33" width="9" height="5" rx="1.2" fill="#c8a84b"/>
  <rect x="53" y="42" width="9" height="5" rx="1.2" fill="#c8a84b"/>
  <!-- Pin 1 dot -->
  <circle cx="16" cy="19" r="3" fill="#c8a84b" opacity="0.9"/>
</svg>
